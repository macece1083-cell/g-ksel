name: Daily English Video

on:
  schedule:
    - cron: "0 6 * * 1,3,5"
    - cron: "0 7 * * 1,3,5"
    - cron: "0 8 * * 1,3,5"
    - cron: "0 9 * * 1,3,5"
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode (general / meb / meb6 / meb7 / lgs8)"
        default: "general"
      level:
        description: "English level (A1/A2/B1/B2/C1/C2)"
        default: "B1"
      topic:
        description: "Topic (or 'auto' for random)"
        default: "auto"
      upload:
        description: "Upload to YouTube?"
        type: boolean
        default: false
      instagram:
        description: "Post to Instagram?"
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: youtube_english_bot/requirements.txt

      - name: Install dependencies
        working-directory: youtube_english_bot
        run: pip install -r requirements.txt

      - name: Write .env
        working-directory: youtube_english_bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TTSMAKER_API_KEY: ${{ secrets.TTSMAKER_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: |
          printf '%s\n' "BOT_PROVIDER=claude" > .env
          printf '%s\n' "TTS_PROVIDER=gtts" >> .env
          printf '%s\n' "IMAGE_PROVIDER=gemini" >> .env
          printf '%s\n' "VIDEO_WIDTH=1920" >> .env
          printf '%s\n' "VIDEO_HEIGHT=1080" >> .env
          printf '%s\n' "DEFAULT_PRIVACY_STATUS=private" >> .env
          printf '%s\n' "YOUTUBE_CLIENT_SECRETS=client_secret.json" >> .env
          printf '%s\n' "YOUTUBE_TOKEN_FILE=token.json" >> .env
          printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY" >> .env
          printf 'GEMINI_API_KEY=%s\n' "$GEMINI_API_KEY" >> .env
          printf 'TTSMAKER_API_KEY=%s\n' "$TTSMAKER_API_KEY" >> .env
          printf 'INSTAGRAM_ACCESS_TOKEN=%s\n' "$INSTAGRAM_ACCESS_TOKEN" >> .env
          printf 'INSTAGRAM_USER_ID=%s\n' "$INSTAGRAM_USER_ID" >> .env
          printf 'IMGBB_API_KEY=%s\n' "$IMGBB_API_KEY" >> .env

      - name: Restore YouTube credentials
        if: ${{ github.event.inputs.upload == 'true' || github.event_name == 'schedule' }}
        working-directory: youtube_english_bot
        env:
          CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
          TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          printf '%s' "$CLIENT_SECRETS" > client_secret.json
          printf '%s' "$TOKEN_JSON" > token.json

      - name: Determine mode and playlist
        id: params
        run: |
          HOUR=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            LEVEL=$(echo "${{ github.event.inputs.level }}" | tr '[:lower:]' '[:upper:]')
            TOPIC="${{ github.event.inputs.topic }}"
          elif [ "$HOUR" -eq 6 ]; then
            MODE="meb"
            LEVEL="A1"
            TOPIC="auto"
          elif [ "$HOUR" -eq 7 ]; then
            MODE="meb6"
            LEVEL="A2"
            TOPIC="auto"
          elif [ "$HOUR" -eq 8 ]; then
            MODE="meb7"
            LEVEL="A2"
            TOPIC="auto"
          elif [ "$HOUR" -eq 9 ]; then
            MODE="lgs8"
            LEVEL="B1"
            TOPIC="auto"
          else
            MODE="general"
            LEVEL="B1"
            TOPIC="auto"
          fi
          case "$MODE" in
            meb)   PLAYLIST="PLQPXBueW5e7Eze3bu-ICM0mlTeCdmaVRL" ;;
            meb6)  PLAYLIST="PLQPXBueW5e7HebbvzXEyVJHCQLsbc_euU" ;;
            meb7)  PLAYLIST="PLQPXBueW5e7HDov0OPBF1oJwXYf1-tjD2" ;;
            lgs8)  PLAYLIST="PLQPXBueW5e7HueH0qRLjEn7HGPRbc4UoS" ;;
            *)     PLAYLIST="PLQPXBueW5e7FnRkzTsfHFHJLxlDORJiWC" ;;
          esac
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "level=$LEVEL" >> $GITHUB_OUTPUT
          echo "topic=$TOPIC" >> $GITHUB_OUTPUT
          echo "playlist=$PLAYLIST" >> $GITHUB_OUTPUT

      - name: Read counter
        id: counter
        if: ${{ steps.params.outputs.mode != 'general' }}
        run: |
          MODE="${{ steps.params.outputs.mode }}"
          FILE="youtube_english_bot/${MODE}_counter.txt"
          if [ -f "$FILE" ]; then
            N=$(cat "$FILE")
          else
            N=1
          fi
          echo "value=$N" >> $GITHUB_OUTPUT

      - name: Generate video
        working-directory: youtube_english_bot
        run: |
          MODE="${{ steps.params.outputs.mode }}"
          if [ "$MODE" != "general" ]; then
            python main.py \
              --mode "$MODE" \
              --level "${{ steps.params.outputs.level }}" \
              --topic "auto" \
              --day "${{ steps.counter.outputs.value || 1 }}"
          else
            python main.py \
              --mode "general" \
              --level "${{ steps.params.outputs.level }}" \
              --topic "${{ steps.params.outputs.topic }}"
          fi

      - name: Upload to YouTube
        if: ${{ github.event.inputs.upload == 'true' || github.event_name == 'schedule' }}
        working-directory: youtube_english_bot
        run: |
          MODE="${{ steps.params.outputs.mode }}"
          if [ "$MODE" != "general" ]; then
            python main.py \
              --mode "$MODE" \
              --level "${{ steps.params.outputs.level }}" \
              --topic "auto" \
              --day "${{ steps.counter.outputs.value || 1 }}" \
              --playlist "${{ steps.params.outputs.playlist }}" \
              --upload
          else
            python main.py \
              --mode "general" \
              --level "${{ steps.params.outputs.level }}" \
              --topic "${{ steps.params.outputs.topic }}" \
              --playlist "${{ steps.params.outputs.playlist }}" \
              --upload
          fi

      - name: Post to Instagram
        if: ${{ github.event.inputs.instagram == 'true' || github.event_name == 'schedule' }}
        working-directory: youtube_english_bot
        run: |
          MODE="${{ steps.params.outputs.mode }}"
          if [ "$MODE" != "general" ]; then
            python main.py \
              --mode "$MODE" \
              --level "${{ steps.params.outputs.level }}" \
              --topic "auto" \
              --day "${{ steps.counter.outputs.value || 1 }}" \
              --instagram
          else
            python main.py \
              --mode "general" \
              --level "${{ steps.params.outputs.level }}" \
              --topic "${{ steps.params.outputs.topic }}" \
              --instagram
          fi

      - name: Update counter
        if: ${{ steps.params.outputs.mode != 'general' && (github.event.inputs.upload == 'true' || github.event_name == 'schedule') }}
        run: |
          MODE="${{ steps.params.outputs.mode }}"
          N=${{ steps.counter.outputs.value || 1 }}
          echo $((N + 1)) > youtube_english_bot/${MODE}_counter.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add youtube_english_bot/${MODE}_counter.txt
          git commit -m "Update ${MODE} counter to $((N + 1))" || true
          git push

      - name: Save video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.run_number }}
          path: youtube_english_bot/output/**/video.mp4
          retention-days: 7