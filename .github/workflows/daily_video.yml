name: Daily English Video

on:
  schedule:
    - cron: "0 6 * * 1,3,5"
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode (general / meb)"
        default: "general"
      level:
        description: "English level (A1/A2/B1/B2/C1/C2)"
        default: "B1"
      topic:
        description: "Topic (or 'auto' for random)"
        default: "auto"
      upload:
        description: "Upload to YouTube?"
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: youtube_english_bot/requirements.txt

      - name: Install dependencies
        working-directory: youtube_english_bot
        run: pip install -r requirements.txt

      - name: Write .env
        working-directory: youtube_english_bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TTSMAKER_API_KEY: ${{ secrets.TTSMAKER_API_KEY }}
        run: |
          printf '%s\n' "BOT_PROVIDER=claude" > .env
          printf '%s\n' "TTS_PROVIDER=gtts" >> .env
          printf '%s\n' "IMAGE_PROVIDER=gemini" >> .env
          printf '%s\n' "VIDEO_WIDTH=1920" >> .env
          printf '%s\n' "VIDEO_HEIGHT=1080" >> .env
          printf '%s\n' "DEFAULT_PRIVACY_STATUS=private" >> .env
          printf '%s\n' "YOUTUBE_CLIENT_SECRETS=client_secret.json" >> .env
          printf '%s\n' "YOUTUBE_TOKEN_FILE=token.json" >> .env
          printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY" >> .env
          printf 'GEMINI_API_KEY=%s\n' "$GEMINI_API_KEY" >> .env
          printf 'TTSMAKER_API_KEY=%s\n' "$TTSMAKER_API_KEY" >> .env

      - name: Restore YouTube credentials
        if: ${{ github.event.inputs.upload == 'true' || github.event_name == 'schedule' }}
        working-directory: youtube_english_bot
        env:
          CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
          TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          printf '%s' "$CLIENT_SECRETS" > client_secret.json
          printf '%s' "$TOKEN_JSON" > token.json

      - name: Determine mode and playlist
        id: params
        run: |
          HOUR=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            LEVEL=$(echo "${{ github.event.inputs.level }}" | tr '[:lower:]' '[:upper:]')
            TOPIC="${{ github.event.inputs.topic }}"
          elif [ "$HOUR" -lt 10 ]; then
            MODE="meb"
            LEVEL="A1"
            TOPIC="auto"
          else
            MODE="general"
            LEVEL="B1"
            TOPIC="auto"
          fi
          if [ "$MODE" = "meb" ]; then
            PLAYLIST="PLQPXBueW5e7Eze3bu-ICM0mlTeCdmaVRL"
          else
            PLAYLIST="PLQPXBueW5e7FnRkzTsfHFHJLxlDORJiWC"
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "level=$LEVEL" >> $GITHUB_OUTPUT
          echo "topic=$TOPIC" >> $GITHUB_OUTPUT
          echo "playlist=$PLAYLIST" >> $GITHUB_OUTPUT

      - name: Read MEB counter
        id: counter
        if: ${{ steps.params.outputs.mode == 'meb' }}
        run: |
          if [ -f youtube_english_bot/meb_counter.txt ]; then
            N=$(cat youtube_english_bot/meb_counter.txt)
          else
            N=0
          fi
          echo "value=$N" >> $GITHUB_OUTPUT

      - name: Generate video
        working-directory: youtube_english_bot
        run: |
          if [ "${{ steps.params.outputs.mode }}" = "meb" ]; then
            python main.py \
              --mode "meb" \
              --level "A1" \
              --topic "auto" \
              --day "${{ steps.counter.outputs.value || 1 }}"
          else
            python main.py \
              --mode "general" \
              --level "${{ steps.params.outputs.level }}" \
              --topic "${{ steps.params.outputs.topic }}"
          fi

      - name: Upload to YouTube
        if: ${{ github.event.inputs.upload == 'true' || github.event_name == 'schedule' }}
        working-directory: youtube_english_bot
        run: |
          if [ "${{ steps.params.outputs.mode }}" = "meb" ]; then
            python main.py \
              --mode "meb" \
              --level "A1" \
              --topic "auto" \
              --day "${{ steps.counter.outputs.value || 1 }}" \
              --playlist "${{ steps.params.outputs.playlist }}" \
              --upload
          else
            python main.py \
              --mode "general" \
              --level "${{ steps.params.outputs.level }}" \
              --topic "${{ steps.params.outputs.topic }}" \
              --playlist "${{ steps.params.outputs.playlist }}" \
              --upload
          fi

      - name: Update MEB counter
        if: ${{ steps.params.outputs.mode == 'meb' && (github.event.inputs.upload == 'true' || github.event_name == 'schedule') }}
        run: |
          N=${{ steps.counter.outputs.value || 0 }}
          echo $((N + 1)) > youtube_english_bot/meb_counter.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add youtube_english_bot/meb_counter.txt
          git commit -m "Update MEB counter to $((N + 1))" || true
          git push

      - name: Save video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.run_number }}
          path: youtube_english_bot/output/**/video.mp4
          retention-days: 7
