name: Daily English Video

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      level:
        description: "English level (A1/A2/B1/B2/C1/C2)"
        default: "B1"
      topic:
        description: "Topic"
        default: "daily vocabulary"
      upload:
        description: "Upload to YouTube?"
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y ffmpeg
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: youtube_bot/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: youtube_bot
      - name: Write .env
        working-directory: youtube_bot
        run: |
          cat > .env <<EOF
          BOT_PROVIDER=template
          TTS_PROVIDER=edge
          TTS_VOICE=en-US-JennyNeural
          IMAGE_PROVIDER=pollinations
          VIDEO_WIDTH=1920
          VIDEO_HEIGHT=1080
          DEFAULT_PRIVACY_STATUS=private
          TTSMAKER_API_KEY=${{ secrets.TTSMAKER_API_KEY }}
          YOUTUBE_CLIENT_SECRETS=client_secret.json
          YOUTUBE_TOKEN_FILE=token.json
          EOF
      - name: Restore YouTube credentials
        if: ${{ github.event.inputs.upload == 'true' }}
        working-directory: youtube_bot
        run: |
          echo "${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}" > client_secret.json
          echo "${{ secrets.YOUTUBE_TOKEN_JSON }}" > token.json
      - name: Generate video
        working-directory: youtube_bot
        run: python main.py --level "${{ github.event.inputs.level || 'B1' }}" --topic "${{ github.event.inputs.topic || 'daily vocabulary' }}"
      - name: Upload to YouTube
        if: ${{ github.event.inputs.upload == 'true' }}
        working-directory: youtube_bot
        run: python main.py --level "${{ github.event.inputs.level || 'B1' }}" --topic "${{ github.event.inputs.topic || 'daily vocabulary' }}" --upload
      - uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.run_number }}
          path: youtube_bot/output/**/video.mp4
          retention-days: 7
